<!-- Tailwind (CDN, OK for prototypes) -->
<script src="https://cdn.tailwindcss.com"></script>

  tailwind.config = {

      extend: {

          'green-primary': '#1B4332',
          'green-mid':     '#2D6A4F',
          'green-success': '#2EA647',
          'green-light':   '#52B788',
          'green-soft':    '#74C69D',
          'green-sage':    '#84BA99',
          'green-pale':    '#B7E4C7',
          'green-bg-1':    '#D8EEDF',
          'green-bg-2':    '#EFF1E8',
          'green-bg-3':    '#F0F5EE',
          'green-info-bg': '#F6F8F3',

          // ─── oranges ───────────────────────────────────
          'orange-dark':   '#A85A1F',
          'orange-primary':'#FF7100',
          'orange-accent': '#F4A261',
          'orange-soft':   '#ED9864',
          'orange-yellow': '#FCBF5E',
          'orange-bg-1':   '#FCE5CB',
          'orange-bg-2':   '#FFE4D6',
          'orange-bg-3':   '#FFF5EB',
          'orange-bg-4':   '#FFD9A8',

          // ─── neutrals ──────────────────────────────────
          'bg-base':       '#F8F9F4',

          'text-secondary':'#3B4A40',
          'text-muted':    '#5D6B62',

          'gmail-red':     '#EA4335',
          'outlook-blue':  '#0327C7',
          'icloud-blue':   '#3A55A3',

          // ─── legacy aliases (preserved so old bium-* code keeps compiling) ─
          deep:   '#1B4332',
          deep2:  '#143028',
          sage:   '#95D5B2',
          sage2:  '#B7E4C7',
          earth:  '#F4A261',
          earth2: '#F8C291',
          earth3: '#FFD9A8',

          en:    ['Inter', 'sans-serif'],

<style>
  html, body { background: #ECEEE6; }
  body {
    font-family: 'Inter', 'Noto Sans KR', -apple-system, system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    margin: 0;
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 24px;
    background:
      radial-gradient(1200px 600px at 50% -100px, #DDE7DA 0%, #ECEEE6 60%) fixed;
  }
  /* tabular numerals — required for the many big-number displays */
  .num { font-variant-numeric: tabular-nums; font-feature-settings: "tnum"; }
  /* hide scrollbars inside the phone */
  .noscroll::-webkit-scrollbar { display: none; }
  .noscroll { scrollbar-width: none; }

  /* ─── animations ────────────────────────────────────────────── */
  @keyframes leafFall {
    0%   { transform: translate(0,0) rotate(0deg); opacity: 1; }
    100% { transform: translate(var(--tx,40px), 360px) rotate(var(--rot,540deg)); opacity: 0; }
  }
  .leaf-anim { animation: leafFall 1.4s cubic-bezier(.22,.61,.36,1) forwards; }

  @keyframes pulseRing {
    0%   { transform: scale(.92); opacity: .9; }
    100% { transform: scale(1.6);  opacity: 0;  }
  }
  .pulse-ring { animation: pulseRing 1.6s ease-out infinite; }

  @keyframes lpPop {
    0%   { transform: translateY(8px) scale(.9); opacity: 0;}
    20%  { transform: translateY(-4px) scale(1.05); opacity: 1;}
    100% { transform: translateY(-46px) scale(1); opacity: 0;}
  }
  .lp-pop { animation: lpPop 1.2s ease-out forwards; }

  @keyframes shimmer {
    0% { background-position: -200% 0; }
    100% { background-position: 200% 0; }
  }
  .shimmer-line {
    background-image: linear-gradient(90deg, rgba(255,255,255,0) 0%, rgba(255,255,255,.55) 50%, rgba(255,255,255,0) 100%);
    background-size: 200% 100%;
    animation: shimmer 2.4s linear infinite;
  }

  @keyframes screenIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .screen-in { animation: screenIn .28s ease-out both; }

  /* small celebration burst for clean-complete */
  @keyframes confettiFloat {
    0%   { transform: translateY(0) rotate(0deg);   opacity: 1; }
    100% { transform: translateY(-12px) rotate(40deg); opacity: .7; }
  }
  .confetti-anim { animation: confettiFloat 1.8s ease-in-out infinite alternate; }

  /* splash loading bar — fills 0 → 100% during 2s startup */
  @keyframes splashFill {
    0%   { width: 0%; }
    100% { width: 100%; }
  }
  .splash-fill { animation: splashFill 1.9s cubic-bezier(.22,.61,.36,1) forwards; }

  /* fade-out used to dismiss the splash before the home screen takes over */
  @keyframes splashOut {
    from { opacity: 1; transform: scale(1); }
    to   { opacity: 0; transform: scale(1.02); }
  }
  .splash-out { animation: splashOut .35s ease-out forwards; }
</style>
</head>
<body>

<div id="root"></div>
